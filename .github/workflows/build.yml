name: Build-Yahya-Private-Stealth
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile Stealth Binary
        # /Ox: Tam hız, /MT: Bağımsız dosya yapısı
        run: |
          cl.exe /EHsc /Ox /MT /D_NDEBUG /Fe:Win_System_Helper.exe main.cpp user32.lib gdi32.lib

      - name: Release EXE
        uses: actions/upload-artifact@v4
        with:
          name: Security_Patch_Files
          path: Win_System_Helper.exe
          
